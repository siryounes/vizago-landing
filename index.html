<!-- REMPLACE TON BLOC FORMULAIRE PAR CELUI-CI -->
<div class="form-card">
    <div class="form-title">Réservez votre appel gratuit</div>
    <div class="form-sub">Notre équipe vous rappelle sur WhatsApp sous 24h.</div>

    <form id="lead-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label for="nom">Nom ou Prénom</label>
            <input type="text" id="nom" required placeholder="Ex: Amine">
        </div>
        <div class="form-group">
            <label for="tel">Numéro WhatsApp</label>
            <input type="tel" id="tel" required placeholder="Ex: +212 661 234567">
        </div>
        <div class="form-group">
            <label for="packChoice">Pack souhaité</label>
            <select id="packChoice">
                <option value="Pack Essentiel - 900 DH">Pack Essentiel — 900 DH (48h)</option>
                <option value="Pack Premium - 1300 DH">Pack Premium — 1300 DH (60h)</option>
                <option value="Je ne sais pas encore">Je ne sais pas encore</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">
            <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.739-1.451L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.966C16.228 1.975 13.763 1.05 11.201 1.05 5.762 1.05 1.34 5.421 1.336 10.85c-.001 1.744.463 3.448 1.343 4.965l-.973 3.55 3.64-.954zm10.954-7.64c-.23-.115-1.363-.674-1.57-.751-.207-.076-.358-.115-.508.114-.15.228-.579.751-.71.901-.13.15-.26.168-.49.053-.23-.115-.97-.358-1.848-1.143-.683-.61-1.144-1.365-1.278-1.6-.134-.23-.014-.354.101-.469.103-.103.23-.269.345-.404.115-.135.153-.23.23-.385.077-.154.039-.289-.02-.404-.057-.115-.508-1.229-.696-1.684-.183-.44-.368-.381-.508-.388-.13-.007-.279-.008-.428-.008-.15 0-.395.056-.602.284-.207.228-.791.773-.791 1.884 0 1.111.808 2.186.919 2.34.111.154 1.59 2.428 3.853 3.404.538.232 1.022.371 1.37.482.54.172 1.03.148 1.417.09.432-.065 1.363-.557 1.557-1.096.194-.539.194-1.002.135-1.095-.058-.094-.207-.154-.437-.27z"/></svg>
            Réserver mon appel gratuit
        </button>
    </form>
</div>

<!-- METS À JOUR TON SCRIPT JAVASCRIPT AVEC CELUI-CI -->
<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXfz4uTVFean9qd83PTJvrbdEOBHm3Yu_1d9zFymnMaz-24DvuGuYVzJ9n8CgNxPw/exec";

    async function handleSubmit(e) {
        e.preventDefault();
        const btn = document.querySelector('.btn-submit');
        btn.innerHTML = `<svg style="animation:spin 1s linear infinite;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"></circle><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Transmission...`;
        btn.disabled = true;

        const selectedPack = document.getElementById('packChoice').value;
        let finalPrice = "En attente";
        
        if (selectedPack.includes("900 DH")) {
            finalPrice = "900 DH";
        } else if (selectedPack.includes("1300 DH")) {
            finalPrice = "1300 DH";
        }

        // Nettoyage et sécurisation du numéro de téléphone pour éviter le bug #ERROR! de Google Sheets
        let rawPhone = document.getElementById('tel').value.trim();
        // On ajoute une apostrophe au tout début : Google Sheets comprend ainsi qu'il s'agit de TEXTE pur
        let safePhone = "'" + rawPhone; 

        const payload = {
            action: "addClient",
            nom: document.getElementById('nom').value.trim(),
            telephone: safePhone, 
            statutAppel: "À appeler",
            metier: "En attente d'appel",
            statutPaiement: "Non Payé",
            montant: finalPrice,
            // On envoie le choix dans 'pack' ET 'observations' pour être sûr que ton Apps Script attrape la bonne colonne
            pack: selectedPack,
            packSouhaite: selectedPack,
            observations: "Choix : " + selectedPack
        };

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (err) { console.log('Transmission effectuée.'); }

        document.getElementById('lead-form').style.display = 'none';
        showPopup();
    }

    function showPopup() {
        const popup = document.getElementById('popup');
        const bar = document.getElementById('progress-bar');
        const countEl = document.getElementById('countdown');
        popup.classList.add('active');
        bar.style.transition = 'width 6000ms linear';
        setTimeout(() => bar.style.width = '0%', 50);
        let count = 6;
        const iv = setInterval(() => {
            count--; countEl.textContent = count;
            if (count <= 0) { clearInterval(iv); popup.classList.remove('active'); }
        }, 1000);
    }
</script>
